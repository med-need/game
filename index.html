<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixel Life</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
  }
  body { position: relative; }
  canvas {
    display: block;
    width: 100%;
    height: 100%;
    background: #111;
    cursor: crosshair;
  }
  #controls {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    display: flex;
    justify-content: center;
    gap: 10px;
    padding: 10px;
    box-sizing: border-box;
  }
  #controls button {
    flex: 1;
    padding: 10px;
    font-size: 16px;
  }
  @media (max-width:600px) {
    #controls button {
      font-size: 14px;
      padding: 8px;
    }
  }
</style>
</head>
<body>
<canvas id="world"></canvas>
<div id="controls">
  <button id="spawn-monster">Випустити монстра</button>
  <button id="spawn-savior">Визвати спасителя</button>
  <button id="random-food">Рандомна їжа</button>
</div>
<script src="life.js"></script>
</body>
</html>
